<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyKliq - Loading</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container { text-align: center; max-width: 320px; }

    .logo {
      width: 80px;
      height: 80px;
      background: #2ae149;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 36px;
      font-weight: 900;
      color: #000;
    }

    h1 { font-size: 22px; margin-bottom: 10px; color: #fff; }

    p { font-size: 15px; color: #888; line-height: 1.5; margin-bottom: 28px; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(42, 225, 73, 0.2);
      border-top-color: #2ae149;
      border-radius: 50%;
      margin: 0 auto 20px;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .retry {
      display: inline-block;
      padding: 10px 24px;
      background: #2ae149;
      color: #000;
      font-weight: 700;
      font-size: 15px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">K</div>
    <div class="spinner" id="spinner"></div>
    <h1 id="title">Loading MyKliq…</h1>
    <p id="message">Fetching your cached posts, stories, and messages.</p>
    <a href="/" class="retry" id="btn" style="display:none">Open MyKliq</a>
  </div>

  <script>
    // Try to navigate to the main app immediately.
    // The service worker will serve it from the cached app shell so it
    // loads even without an internet connection, showing data from the
    // local IndexedDB cache (feed, stories, messages, etc.).
    function goToApp() {
      window.location.replace('/');
    }

    // Give the service worker 300 ms to wake up, then navigate.
    setTimeout(goToApp, 300);

    // Fallback: if we're still here after 4 s, show manual button.
    setTimeout(function () {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('title').textContent = navigator.onLine
        ? 'Almost there…'
        : 'You\'re offline';
      document.getElementById('message').textContent = navigator.onLine
        ? 'Connecting to MyKliq.'
        : 'No internet connection. Your cached feed and messages are still available.';
      document.getElementById('btn').style.display = 'inline-block';
    }, 4000);

    // Auto-navigate when connectivity is restored
    window.addEventListener('online', goToApp);
  </script>
</body>
</html>
