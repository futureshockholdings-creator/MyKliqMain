name: Mobile EAS CLI Smoke Test

# This workflow is retired — the app is distributed via PWABuilder, not EAS.
# Kept as a manual-only reference in case EAS is needed in the future.
# Trigger: workflow_dispatch only (never runs automatically on push).
on:
  workflow_dispatch:

jobs:
  eas-smoke-test:
    name: Verify EAS CLI boots after npm install
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: Run EAS CLI smoke test
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npm run check:eas
